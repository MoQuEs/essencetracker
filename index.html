<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Endfield Weapon Essence Tracker</title>

	<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
	<link rel="icon" type="image/png" href="images/favicon.ico">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
	<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
	<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

	<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const {useState, useEffect, useMemo} = React;

    const None = 'None';
    const isNone = (value) => value === None;
    const isNotNone = (value) => !isNone(value);

    String.prototype.isNone = function () {
        return isNone(this);
    };
    String.prototype.isNotNone = function () {
        return isNotNone(this);
    };

    function App() {
        const [data, setData] = useState(null);
        const [priorities, setPriorities] = useState(() => {
            const saved = localStorage.getItem('endfield_priorities_v5');
            return saved ? JSON.parse(saved) : null;
        });
        const [attrCombos, setAttrCombos] = useState(null);
        const [filter, setFilter] = useState('');
        const [showResetModal, setShowResetModal] = useState(false);
        const [showImportExportModal, setShowImportExportModal] = useState(false);
        const [showEssenceCheckerModal, setShowEssenceCheckerModal] = useState(false);
        const [importExportMode, setImportExportMode] = useState('export');
        const [importExportText, setImportExportText] = useState('');
        const [importExportError, setImportExportError] = useState('');
        const [selectedResult, setSelectedResult] = useState(null);
        const [checkerFilters, setCheckerFilters] = useState({
            attribute: None,
            secondary: None,
            skill: None
        });
        const [checkerModalSnapshot, setCheckerModalSnapshot] = useState({
            p2Names: [],
            p1Names: [],
            p0Names: [],
            total: 0,
            selectedCount: 0
        });
        const [activeTooltip, setActiveTooltip] = useState(null);
        const [collapsedCategories, setCollapsedCategories] = useState(() => {
            const saved = localStorage.getItem('endfield_collapsed_categories_v1');
            return saved ? JSON.parse(saved) : {};
        });

        useEffect(() => {
            fetch('data.json')
                .then(res => res.json())
                .then(json => {
                    setData(json);
                    setPriorities(prev => {
                        const merged = {...(prev || {})};
                        json.weapons.forEach(w => {
                            if (merged[w.name] === undefined) {
                                merged[w.name] = w.rarity === 3 ? 0 : 1;
                            }
                        });
                        return merged;
                    });
                    setAttrCombos(combinations(json.attribute, 3));
                });
        }, []);

        useEffect(() => {
            if (priorities) {
                localStorage.setItem('endfield_priorities_v5', JSON.stringify(priorities));
            }
        }, [priorities]);

        useEffect(() => {
            localStorage.setItem('endfield_collapsed_categories_v1', JSON.stringify(collapsedCategories));
        }, [collapsedCategories]);

        // Back button handling
        useEffect(() => {
            const handlePopState = (e) => {
                if (selectedResult || showResetModal || showImportExportModal || showEssenceCheckerModal) {
                    setSelectedResult(null);
                    setShowResetModal(false);
                    setShowImportExportModal(false);
                    setShowEssenceCheckerModal(false);
                    setImportExportError('');
                }
            };
            window.addEventListener('popstate', handlePopState);
            return () => window.removeEventListener('popstate', handlePopState);
        }, [selectedResult, showResetModal, showImportExportModal, showEssenceCheckerModal]);

        useEffect(() => {
            if (selectedResult || showResetModal || showImportExportModal || showEssenceCheckerModal) {
                if (!window.history.state?.modal) {
                    window.history.pushState({modal: true}, '');
                }
            }
        }, [selectedResult, showResetModal, showImportExportModal, showEssenceCheckerModal]);

        const normalizeName = (name) =>
            name.replace(/ /g, '_').replace(/:/g, '').replace(/'/g, '');

        const weaponNameToImageName = (name) =>
            normalizeName(name.toLowerCase());

        const weaponPlaceholder = (categoryType) =>
            `images/weaponcategory_${weaponNameToImageName(categoryType)}.png`;

        const closeModals = () => {
            if (selectedResult || showResetModal || showImportExportModal || showEssenceCheckerModal) {
                setSelectedResult(null);
                setShowResetModal(false);
                setShowImportExportModal(false);
                setShowEssenceCheckerModal(false);
                setImportExportError('');
                if (window.history.state?.modal) {
                    window.history.back();
                }
            }
        };

        const resetCheckerFilters = () => {
            setCheckerFilters({attribute: None, secondary: None, skill: None});
        };

        const openEssenceCheckerModal = () => {
            setShowEssenceCheckerModal(true);
        };

        const confirmReset = () => {
            const initial = {};
            data.weapons.forEach(w => {
                initial[w.name] = w.rarity === 3 ? 0 : 1;
            });
            setPriorities(initial);
            closeModals();
        };

        const openImportExportModal = (mode) => {
            setImportExportMode(mode);
            setImportExportError('');
            if (mode === 'export') {
                setImportExportText(JSON.stringify(priorities || {}, null, 2));
            } else {
                setImportExportText('');
            }
            setShowImportExportModal(true);
        };

        const handleExportPriorities = () => {
            setImportExportMode('export');
            setImportExportError('');
            setImportExportText(JSON.stringify(priorities || {}, null, 2));
        };

        const handleImportPriorities = () => {
            if (!data) return;

            let parsed;
            try {
                parsed = JSON.parse(importExportText);
            } catch (err) {
                setImportExportError('Invalid JSON. Please paste a valid JSON object.');
                return;
            }

            if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                setImportExportError('JSON must be an object in the format {"Weapon Name": 0|1|2}.');
                return;
            }

            const parsedEntries = Object.entries(parsed);
            const hasInvalidPriority = parsedEntries.some(([, value]) => ![0, 1, 2].includes(value));
            if (hasInvalidPriority) {
                setImportExportError('Each priority value must be exactly 0, 1, or 2.');
                return;
            }

            const knownWeapons = new Set(data.weapons.map(w => w.name));
            const nextPriorities = {};

            // Preserve unknown keys from existing priorities.
            Object.entries(priorities || {}).forEach(([name, value]) => {
                if (!knownWeapons.has(name) && [0, 1, 2].includes(value)) {
                    nextPriorities[name] = value;
                }
            });

            // Full replace for known weapons: import value if present,
            // otherwise keep current priority, otherwise fall back to default.
            data.weapons.forEach(w => {
                if (Object.prototype.hasOwnProperty.call(parsed, w.name)) {
                    nextPriorities[w.name] = parsed[w.name];
                } else {
                    nextPriorities[w.name] = (priorities[w.name] !== undefined)
                        ? priorities[w.name]
                        : (w.rarity === 3 ? 0 : 1);
                }
            });

            // Also keep unknown keys from imported JSON.
            parsedEntries.forEach(([name, value]) => {
                if (!knownWeapons.has(name)) {
                    nextPriorities[name] = value;
                }
            });

            setPriorities(nextPriorities);
            closeModals();
        };

        const togglePriority = (name) => {
            setPriorities(prev => {
                const curr = prev[name];
                const next = curr === 1 ? 2 : (curr === 2 ? 0 : 1);
                return {...prev, [name]: next};
            });
        };

        const toggleCategoryCollapse = (cat) => {
            setCollapsedCategories(prev => ({
                ...prev,
                [cat]: !prev[cat]
            }));
        };

        const combinations = (array, k) => {
            const result = [];
            const fn = (start, combo) => {
                if (combo.length === k) {
                    result.push(combo);
                    return;
                }
                for (let i = start; i < array.length; i++) {
                    fn(i + 1, [...combo, array[i]]);
                }
            };
            fn(0, []);
            return result;
        };

        const results = useMemo(() => {
            if (!data || !priorities) return [];

            const solverResults = [];
            const locations = data.alluvium;

            Object.entries(locations).forEach(([locName, locData]) => {
                const selections = [
                    ...locData.secondary.map(s => ({type: 'secondary', val: s})),
                    ...locData.skill.map(s => ({type: 'skill', val: s}))
                ];

                selections.forEach(sel => {
                    attrCombos.forEach(attrSel => {
                        const p2Outcomes = [];
                        const p1Outcomes = [];
                        const p0Outcomes = [];

                        data.weapons.forEach(w => {
                            if (!attrSel.includes(w.attr_stat)) return;

                            const isMatch = sel.type === 'secondary'
                                ? ((w.sec_stat === sel.val || w.sec_stat.isNone()) && locData.skill.includes(w.skill_stat))
                                : (w.skill_stat === sel.val && (w.skill_stat.isNone() || locData.secondary.includes(w.sec_stat)));

                            if (isMatch) {
                                const p = priorities[w.name] ?? 1;
                                if (p === 2) p2Outcomes.push(w);
                                else if (p === 1) p1Outcomes.push(w);
                                else p0Outcomes.push(w);
                            }
                        });

                        if (p2Outcomes.length > 0 || p1Outcomes.length > 0) {
                            const score = (p2Outcomes.length * 1000) + p1Outcomes.length + (p0Outcomes.length * 0.001);
                            solverResults.push({
                                location: locName,
                                attrItems: attrSel,
                                selItem: sel.val,
                                engravingGroups: {
                                    primary: attrSel,
                                    secondary: sel.type === 'secondary' ? [sel.val] : [],
                                    skill: sel.type === 'skill' ? [sel.val] : []
                                },
                                score: score,
                                p2List: p2Outcomes,
                                p1List: p1Outcomes,
                                p0List: p0Outcomes
                            });
                        }
                    });
                });
            });

            const anyP2Selected = Object.values(priorities).some(p => p === 2);
            let filtered = solverResults;

            // If any targets are marked P2, only show combinations that can produce at least one of them.
            if (anyP2Selected) {
                filtered = solverResults.filter(r => r.p2List.length > 0);
            }

            filtered = filtered.filter(r => r.p2List.length > 0 || r.p1List.length > 0);

            return filtered.sort((a, b) => b.score - a.score).slice(0, 100);
        }, [data, priorities]);

        const groupedWeapons = useMemo(() => {
            if (!data) return {};
            const groups = {};
            data.weaponcategory.forEach(cat => groups[cat] = []);
            data.weapons.forEach(w => {
                if (w.name.toLowerCase().includes(filter.toLowerCase())) groups[w.type]?.push(w);
            });
            Object.keys(groups).forEach(cat => {
                groups[cat].sort((a, b) => {
                    if (a.rarity !== b.rarity) return b.rarity - a.rarity;
                    return a.name.localeCompare(b.name);
                });
            });
            return groups;
        }, [data, filter]);

        const categoryCounts = useMemo(() => {
            if (!data || !priorities || !attrCombos) return {};
            const counts = {};

            data.weaponcategory.forEach(cat => {
                let p0 = 0;
                let p1 = 0;
                let p2 = 0;

                (groupedWeapons[cat] || []).forEach(w => {
                    const p = priorities[w.name] ?? 1;
                    if (p === 2) p2 += 1;
                    else if (p === 1) p1 += 1;
                    else p0 += 1;
                });

                counts[cat] = {
                    untracked: p0,
                    tracked: p1 + p2,
                    priority: p2
                };
            });

            return counts;
        }, [groupedWeapons, priorities]);

        const perfectMatchesByPriority = useMemo(() => {
            if (!data || !priorities) return {p2: [], p1: [], p0: [], total: 0, selectedCount: 0};

            const selectedCount =
                (checkerFilters.attribute.isNotNone() ? 1 : 0) +
                (checkerFilters.secondary.isNotNone() ? 1 : 0) +
                (checkerFilters.skill.isNotNone() ? 1 : 0);

            const perfect = data.weapons.filter(w => {
                if (checkerFilters.attribute.isNotNone() && w.attr_stat.isNotNone() && w.attr_stat !== checkerFilters.attribute) return false;
                if (checkerFilters.secondary.isNotNone() && w.sec_stat.isNotNone() && w.sec_stat !== checkerFilters.secondary) return false;
                if (checkerFilters.skill.isNotNone() && w.skill_stat.isNotNone() && w.skill_stat !== checkerFilters.skill) return false;
                return true;
            });

            const p2 = [];
            const p1 = [];
            const p0 = [];

            perfect.forEach(w => {
                const p = priorities[w.name] ?? 1;
                if (p === 2) p2.push(w);
                else if (p === 1) p1.push(w);
                else p0.push(w);
            });

            return {p2, p1, p0, total: perfect.length, selectedCount: selectedCount};
        }, [data, priorities, checkerFilters]);

        const ENGRAVING_CATEGORIES = [
            {key: 'primary', label: 'Primary'},
            {key: 'secondary', label: 'Secondary'},
            {key: 'skill', label: 'Skill'}
        ];

        const renderEngravingGroups = (engravingGroups) => {
            const normalizedGroups = {
                primary: engravingGroups?.primary || [],
                secondary: engravingGroups?.secondary || [],
                skill: engravingGroups?.skill || []
            };

            return (
                <div className="d-flex flex-column gap-1 mt-1">
                    {ENGRAVING_CATEGORIES.map(category => (
                        <div key={category.key} className="d-flex flex-wrap gap-1 align-items-center">
                            <span style={{
                                fontSize: '0.65rem',
                                color: '#aaa',
                                fontWeight: 'bold',
                                minWidth: '65px'
                            }}>{category.label}:</span>
                            {normalizedGroups[category.key].length > 0 ? (
                                normalizedGroups[category.key].map((value, vi) => (
                                    <span key={`${category.key}-${vi}-${value}`} className="stat-badge"
                                          style={{color: '#888'}}>{value}</span>
                                ))
                            ) : ''}
                        </div>
                    ))}
                </div>
            );
        };

        const WeaponStats = ({weapon, classes, constantWidth, wrap}) => (
            <div className={`d-flex ${wrap ? "flex-wrap" : "flex-column"} gap-1 ${classes}`}>
                <span className={`stat-badge ${constantWidth ? "w-100 m-0" : undefined}`}>{weapon.attr_stat}</span>
                <span className={`stat-badge ${constantWidth ? "w-100 m-0" : undefined}`}>{weapon.sec_stat}</span>
                <span className={`stat-badge ${constantWidth ? "w-100 m-0" : undefined}`}>{weapon.skill_stat}</span>
            </div>
        );

        const Tooltip = ({weapon, uniqueId}) => (
            <div className="stat-tooltip" style={{display: activeTooltip === uniqueId ? 'block' : undefined}}>
                <WeaponCard w={weapon} compact={true} tooltip={true} />
            </div>
        );

        const sortWeaponsByRarityThenName = (list) => {
            return [...list].sort((a, b) => {
                if (a.rarity !== b.rarity) return b.rarity - a.rarity;
                return a.name.localeCompare(b.name);
            });
        };

        useEffect(() => {
            if (!showEssenceCheckerModal || !data || !priorities) return;

            setCheckerModalSnapshot({
                p2Names: sortWeaponsByRarityThenName(perfectMatchesByPriority.p2).map(w => w.name),
                p1Names: sortWeaponsByRarityThenName(perfectMatchesByPriority.p1).map(w => w.name),
                p0Names: sortWeaponsByRarityThenName(perfectMatchesByPriority.p0).map(w => w.name),
                total: perfectMatchesByPriority.total,
                selectedCount: perfectMatchesByPriority.selectedCount
            });
        }, [showEssenceCheckerModal, checkerFilters.attribute, checkerFilters.secondary, checkerFilters.skill, data]);

        const weaponsByName = useMemo(() => {
            if (!data) return {};
            return Object.fromEntries(data.weapons.map(w => [w.name, w]));
        }, [data]);

        const WeaponCard = ({w, compact, tooltip}) => {
            const p = priorities[w.name];
            const colorClass = p === 2 ? 'color-p2' : (p === 1 ? 'color-p1' : 'color-p0');
            const isP2 = p === 2;

            return (
                <div className={`${tooltip ? "" : "col-md-6 col-12 mb-2"}`}>
                    <div
                        className={`${compact ? "compact-weapon-card" : "weapon-card"} priority-${p}`}
                        onClick={() => togglePriority(w.name)}
                    >
                        <div className={`card-accent accent-${w.rarity}`}></div>
                        {isP2 &&
                            <span className="star-icon" style={{top: '4px', right: '6px', fontSize: '1rem'}}>★</span>}

                        <div className="d-flex align-items-center">
                            <div className={`weapon-img-container img-bg-${w.rarity}`}>
                                <img src={`images/weapon_${weaponNameToImageName(w.name)}.png`} className="weapon-img"
                                     alt={w.name} onError={(e) => {
                                    e.target.onerror = null;
                                    e.target.src = weaponPlaceholder(w.type);
                                }} />
                            </div>

                            <div className="flex-grow-1 min-width-0">
                                <div className={`fw-bold text-truncate ${colorClass}`}
                                     style={{fontSize: '1rem'}}>{w.name}</div>

                                {!compact && (<div className="d-flex align-items-center mt-1">
                                    <span className={`color-${w.rarity}-rarity`}
                                          style={{fontSize: '0.8rem', fontWeight: 'bold'}}>{w.rarity}★</span>
                                    <span className="mx-2 text-muted">|</span>
                                    <span className={`text-uppercase color-${w.rarity}-rarity`}
                                          style={{fontSize: '0.7rem'}}>{w.type}</span>
                                </div>)}

                                <WeaponStats weapon={w}
                                             classes={`${compact ? "mt-1" : "mt-3 pt-2 border-top border-secondary border-opacity-25"}`}
                                             wrap={true} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const EssenceMatchesList = ({list, p, listIndex}) => (
            <div className="outcome-row">
                <div className="weapon-container-right">
                    {list.map(o => {
                        const uid = `${p}-${listIndex}-${o.name}`;
                        return (
                            <span key={uid}
                                  className={`weapon-name-box color-${p}`}
                                  onMouseEnter={(e) => {
                                      e.stopPropagation();
                                      setActiveTooltip(uid);
                                  }}
                                  onMouseLeave={(e) => {
                                      e.stopPropagation();
                                      setActiveTooltip(null);
                                  }}
                                  onClick={(e) => {
                                      e.stopPropagation();
                                      setActiveTooltip(activeTooltip === uid ? null : uid);
                                  }}
                            >
                                    {o.name}
                                <Tooltip weapon={o} uniqueId={uid} />
                                </span>
                        );
                    })}
                </div>
            </div>
        );

        const CheckerModalSnapshotList = ({weapons, text}) => weapons.length > 0 && (
            <div>
                <h6 className="text-uppercase color-p0 mb-3"
                    style={{letterSpacing: '1px'}}>${text} ({weapons.length})</h6>
                <div className="row g-2">
                    {weapons.map(name => {
                        const weapon = weaponsByName[name];
                        return weapon ? <WeaponCard key={name} w={weapon} compact={true} /> : null;
                    })}
                </div>
            </div>
        );

        const CheckerModalSnapshotCheckboxes = ({data, text, type}) => (
            <div className="checker-section">
                <div className="text-uppercase fw-bold mb-2"
                     style={{fontSize: '0.78rem', letterSpacing: '0.7px', color: '#aaa'}}>{text}</div>
                <div className="d-flex flex-wrap gap-2">
                    <button
                        className={`checker-chip ${checkerFilters[type] === None ? 'checker-chip-active' : ''}`}
                        onClick={() => setCheckerFilters(prev => ({...prev, [type]: None}))}
                    >
                        {None}
                    </button>
                    {data[type].map(option => (
                        <button
                            key={`${type}-${option}`}
                            className={`checker-chip ${checkerFilters[type] === option ? 'checker-chip-active' : ''}`}
                            onClick={() => setCheckerFilters(prev => ({...prev, [type]: option}))}
                        >
                            {option}
                        </button>
                    ))}
                </div>
            </div>
        );

        const SelectedResultList = ({weapons, text}) => weapons.length > 0 && (
            <div>
                <h6 className="text-uppercase color-p0 mb-3"
                    style={{letterSpacing: '1px'}}>${text} ({weapons.length})</h6>
                <div className="row g-2">
                    {sortWeaponsByRarityThenName(weapons).map(w => <WeaponCard key={w.name} w={w} compact={true} />)}
                </div>
            </div>
        );

        if (!data || !priorities) return <div className="loading-overlay">Loading Data...</div>;

        return (
            <div className="container-fluid py-4">
                {showResetModal && (
                    <div className="custom-modal-overlay">
                        <div className="custom-modal" style={{maxWidth: '400px'}}>
                            <h4 className="mb-3">Reset Priorities</h4>
                            <p style={{color: '#fff', fontSize: '1rem'}}>Reset all weapons back to default priority?</p>
                            <div className="modal-buttons">
                                <button className="modal-btn btn-confirm" onClick={confirmReset}>RESET</button>
                                <button className="modal-btn btn-cancel" onClick={closeModals}>CANCEL</button>
                            </div>
                        </div>
                    </div>
                )}

                {showImportExportModal && (
                    <div className="custom-modal-overlay" onClick={closeModals}>
                        <div className="custom-modal" style={{maxWidth: '700px'}} onClick={e => e.stopPropagation()}>
                            <h4 className="mb-3">Priority Import / Export</h4>
                            <div className="d-flex gap-2 mb-3">
                                <button className="reset-btn" onClick={handleExportPriorities}>EXPORT JSON</button>
                                <button className="reset-btn" onClick={() => {
                                    setImportExportMode('import');
                                    setImportExportError('');
                                }}>IMPORT JSON
                                </button>
                            </div>
                            <label for="importExportTextarea" style={{color: '#aaa', fontSize: '0.85rem'}}>
                                {importExportMode === 'export'
                                    ? 'Copy this JSON to export your saved priorities.'
                                    : 'Paste JSON object in format {"Weapon Name": 0|1|2}. Known weapons are fully replaced; Added weapons between export and import are preserved.'}
                            </label>
                            <textarea
                                id="importExportTextarea"
                                className="form-control form-control-sm bg-dark text-light border-secondary"
                                rows="14"
                                value={importExportText}
                                readOnly={importExportMode === 'export'}
                                onChange={e => setImportExportText(e.target.value)}
                                placeholder='{"Weapon Name": 2}'
                                style={{fontFamily: 'Consolas, Monaco, monospace'}}
                            />
                            {importExportError && (
                                <div className="mt-2"
                                     style={{color: '#ff8a8a', fontSize: '0.85rem'}}>{importExportError}</div>
                            )}
                            <div className="modal-buttons">
                                {importExportMode === 'import' && (
                                    <button className="modal-btn btn-confirm"
                                            onClick={handleImportPriorities}>IMPORT</button>
                                )}
                                <button className="modal-btn btn-cancel" onClick={closeModals}>CLOSE</button>
                            </div>
                        </div>
                    </div>
                )}

                {selectedResult && (
                    <div className="custom-modal-overlay" onClick={closeModals}>
                        <div className="custom-modal" onClick={e => e.stopPropagation()}>
                            <div
                                className="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-2">
                                <h4 className="m-0 color-p1">{selectedResult.location}</h4>
                                <div className="d-flex align-items-center gap-2">
                                    <button className="btn-close btn-close-white" onClick={closeModals}></button>
                                </div>
                            </div>

                            <div
                                className="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-2">
                                {renderEngravingGroups(selectedResult.engravingGroups)}
                            </div>

                            <SelectedResultList weapons={selectedResult.p2List} text="Priority Essences" />
                            <SelectedResultList weapons={selectedResult.p1List} text="Matched Essences" />
                            <SelectedResultList weapons={selectedResult.p0List} text="Untracked Essences" />
                        </div>
                    </div>
                )}

                {showEssenceCheckerModal && (
                    <div className="custom-modal-overlay" onClick={closeModals}>
                        <div className="custom-modal checker-modal" style={{maxWidth: '1080px'}}
                             onClick={e => e.stopPropagation()}>
                            <div
                                className="d-flex justify-content-between align-items-center mb-3 border-bottom border-secondary pb-2">
                                <h4 className="m-0 color-p1">Essence checker</h4>
                                <div className="d-flex align-items-center gap-2">
                                    <button className="reset-btn" onClick={resetCheckerFilters}>CLEAR</button>
                                    <button className="btn-close btn-close-white" onClick={closeModals}></button>
                                </div>
                            </div>
                            <div className="row g-4 checker-modal-body">
                                <div className="col-lg-5">
                                    <CheckerModalSnapshotCheckboxes data={data} text="Primary Attribute"
                                                                    type="attribute" />
                                    <CheckerModalSnapshotCheckboxes data={data} text="Secondary Stat"
                                                                    type="secondary" />
                                    <CheckerModalSnapshotCheckboxes data={data} text="Skill Stat" type="skill" />
                                </div>

                                <div className="col-lg-7 checker-right-pane">
                                    <div
                                        className="d-flex justify-content-between align-items-end mb-3 border-bottom border-secondary pb-2">
                                        <div>
                                            <h6 className="text-uppercase color-p1 mb-1"
                                                style={{letterSpacing: '1px'}}>Compatible Weapons
                                                                               ({checkerModalSnapshot.total} found)</h6>
                                            <div style={{fontSize: '0.75rem', color: '#888'}}>
                                                {checkerModalSnapshot.selectedCount === 0
                                                    ? 'Showing all weapons (no filters selected).'
                                                    : `Showing matches for ${checkerModalSnapshot.selectedCount}/3 selected stats.`}
                                            </div>
                                        </div>
                                    </div>

                                    {checkerModalSnapshot.total === 0 && (
                                        <div className="checker-empty">No perfect 3/3 weapons found for this exact
                                                                       essence combination.</div>
                                    )}

                                    <CheckerModalSnapshotList weapons={checkerModalSnapshot.p2Names}
                                                              text="Priority Essences" />
                                    <CheckerModalSnapshotList weapons={checkerModalSnapshot.p1Names}
                                                              text="Matched Essences" />
                                    <CheckerModalSnapshotList weapons={checkerModalSnapshot.p0Names}
                                                              text="Untracked Essences" />
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                <div className="row g-4">
                    <div className="col-lg-6">
                        <div className="mb-3">
                            <div className="d-flex justify-content-between align-items-center mb-2">
                                <h3 className="m-0 fw-bold">ESSENCE TARGETS</h3>
                                <div className="d-flex gap-2">
                                    <a className="reset-btn btn-yellow" href="https://moques.github.io/endfieldtools/"
                                       target="_blank" rel="noopener noreferrer">HUB</a>
                                    <button className="reset-btn" onClick={openEssenceCheckerModal}>ESSENCE CHECKER
                                    </button>
                                    <button className="reset-btn"
                                            onClick={() => openImportExportModal('export')}>EXPORT
                                    </button>
                                    <button className="reset-btn"
                                            onClick={() => openImportExportModal('import')}>IMPORT
                                    </button>
                                    <button className="reset-btn" onClick={() => setShowResetModal(true)}>RESET</button>
                                </div>
                            </div>
                            <div className="d-flex gap-2 align-items-center">
                                <label for="search"
                                       style={{fontSize: '0.8rem', color: '#666', fontWeight: 'bold'}}>SEARCH:</label>
                                <input id="search" type="text"
                                       className="form-control form-control-sm bg-dark text-light border-secondary"
                                       placeholder="..." value={filter} onChange={e => setFilter(e.target.value)}
                                       style={{flex: 1}} />
                            </div>
                        </div>

                        <div className="pe-2">
                            {data.weaponcategory.map(cat => (
                                groupedWeapons[cat].length > 0 && (
                                    <div key={cat}>
                                        {(() => {
                                            const counts = categoryCounts[cat] || {
                                                untracked: 0,
                                                tracked: 0,
                                                priority: 0
                                            };
                                            return (
                                                <div className="category-header mb-3"
                                                     onClick={() => toggleCategoryCollapse(cat)}
                                                     style={{cursor: 'pointer'}}>
                                                    <img
                                                        src={`images/weaponcategory_${weaponNameToImageName(cat.toLowerCase())}.png`}
                                                        className="category-icon" alt={cat} />
                                                    <span
                                                        className="text-uppercase fw-bold category-title">{cat}S</span>
                                                    <div className="category-counters">
                                                        <span
                                                            className="category-counter-badge color-p0">Untracked: {counts.untracked}</span>
                                                        <span
                                                            className="category-counter-badge color-p1">Tracked: {counts.tracked}</span>
                                                        <span
                                                            className="category-counter-badge color-p2">Priority: {counts.priority}</span>
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                        {(!collapsedCategories[cat] || filter) && (
                                            <div className="row g-3">
                                                {groupedWeapons[cat].map(w => (
                                                    <WeaponCard key={w.name} w={w} compact={false} />
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )
                            ))}
                        </div>
                    </div>

                    <div className="col-lg-6">
                        <div className="sticky-results">
                            <div className="mb-3">
                                <h3 className="m-0 fw-bold">ESSENCE MATCHES</h3>
                            </div>
                            <div className="results-card bg-opacity-50">
                                <div className="table-responsive">
                                    <table className="table table-dark table-hover mb-0 results-table">
                                        <thead className="text-uppercase" style={{fontSize: '0.75rem', color: '#aaa'}}>
                                        <tr>
                                            <th className="ps-3 py-3" style={{width: '35%'}}>Location / Engravings</th>
                                            <th className="py-3 pe-3">Weapon Essences</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        {results.map((r, i) => (
                                            <tr key={i} onClick={() => setSelectedResult(r)}>
                                                <td className="ps-3 py-3">
                                                    <div className="fw-bold mb-1" style={{
                                                        fontSize: '1.1rem',
                                                        color: '#a0d8ef'
                                                    }}>{r.location}</div>
                                                    <div className="mb-2" style={{fontSize: '0.75rem'}}>
                                                        <span className="text-uppercase" style={{
                                                            letterSpacing: '0.5px',
                                                            color: '#aaa'
                                                        }}>Matches: </span>
                                                        <span className="mx-1 color-p2 fw-bold">{r.p2List.length}</span>
                                                        <span className="mx-1 color-p1 fw-bold">{r.p1List.length}</span>
                                                        <span className="mx-1 color-p0 fw-bold">{r.p0List.length}</span>
                                                    </div>
                                                    <div className="mt-2">
                                                        {renderEngravingGroups(r.engravingGroups)}
                                                    </div>
                                                </td>
                                                <td className="align-middle pe-3">
                                                    <EssenceMatchesList list={r.p2List} p="p2" listIndex={i} />
                                                    <EssenceMatchesList list={r.p1List} p="p1" listIndex={i} />
                                                    <EssenceMatchesList list={r.p0List} p="p0" listIndex={i} />
                                                </td>
                                            </tr>
                                        ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
